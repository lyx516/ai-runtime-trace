<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Flow Agent 管理</title>
<link rel="stylesheet" href="pool.css">
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">Hermes Flow</span>
  <nav class="topbar-nav" aria-label="主导航">
    <a href="/">📡 观测</a>
    <a class="active" href="pool.html">🤖 管理</a>
  </nav>
  <span id="status-pill" class="status-pill">连接中</span>
</div>

<main id="app" class="admin-layout">
  <aside class="panel tree-panel" aria-label="Agent 树">
    <div class="panel-head">
      <div>
        <h1>Agent 树</h1>
        <p id="agent-root" class="muted">扫描 agents/</p>
      </div>
      <button id="refresh-btn" class="ghost-btn" type="button">刷新</button>
    </div>
    <label class="search-box">
      <span>筛选</span>
      <input id="agent-filter" type="search" placeholder="agent id / 名称 / role">
    </label>
    <div id="agent-tree" class="tree-list loading">加载 Agent...</div>
  </aside>

  <section class="panel detail-panel" aria-label="详情编辑">
    <div id="detail" class="detail-empty">
      <div class="empty-title">选择一个 Agent</div>
      <p>左侧目录层级由后端解析为继承关系。详情页展示可编辑的本地配置，并显示后端合并后的继承预览。</p>
    </div>
  </section>

  <aside class="panel pool-panel" aria-label="Skill 和 Tool 池">
    <div class="panel-head compact">
      <div class="segmented" role="tablist" aria-label="资源池">
        <button id="tab-skills" class="active" type="button" data-pool="skills">Skill 池</button>
        <button id="tab-tools" type="button" data-pool="tools">Tool 池</button>
      </div>
    </div>
    <label class="search-box">
      <span>搜索</span>
      <input id="pool-filter" type="search" placeholder="名称 / id / 描述">
    </label>
    <div id="pool-content" class="pool-list loading">加载资源...</div>
  </aside>
</main>

<div id="toast" role="status" aria-live="polite"></div>
<script src="pool.js"></script>
</body>
</html>
