openapi: 3.1.0
info:
  title: Hermes Flow Trace Span Schema
  version: 0.1.0
  description: >
    Contract for TraceSpan objects written to the trace_events SQLite table.
    AI agents read this table directly via SQL; this schema documents the row structure.
    These are NOT HTTP endpoints — the contract exists for self-description and test validation.

components:
  schemas:
    TraceSpan:
      type: object
      required: [trace_id, span_id, run_id, event_type, ts_start, ts_end, duration_ms, ended]
      properties:
        trace_id:
          type: string
          description: Root identifier for one causal tree (UUID hex, 12 chars)
        span_id:
          type: string
          description: Unique span identifier (UUID hex, 12 chars)
        parent_span_id:
          type: string
          description: Parent span_id, empty for root spans
          default: ""
        run_id:
          type: string
          description: Owning flow run identifier
        event_type:
          type: string
          enum:
            - flow_init
            - load_flow
            - validate_flow
            - create_run
            - build_context
            - validate_write
            - route_message
            - record_decision
            - record_message
            - evaluate_gate
            - advance_state
            - worker_dispatch
            - loop_check
            - idle_check
            - send_message
            - decide
            - step
            - pause_run
            - resume_run
            - abort_run
            - status
            - audit_export
          description: Machine-readable action label
        ts_start:
          type: string
          format: date-time
          description: ISO-8601 UTC span entry timestamp
        ts_end:
          type: string
          format: date-time
          description: ISO-8601 UTC span exit timestamp
        duration_ms:
          type: integer
          minimum: 0
          description: Wall-clock duration in milliseconds
        inputs:
          type: object
          description: Arguments passed to this step (JSON dict)
          default: {}
        outputs:
          type: object
          description: Return values of this step (JSON dict)
          default: {}
        decisions:
          type: object
          description: Choice-based outcomes (gate result, routing decision, budget status)
          default: {}
        error:
          type: object
          nullable: true
          required: [type, message]
          properties:
            type:
              type: string
              description: Exception class name (e.g., FileNotFoundError)
            message:
              type: string
              description: Exception message
            traceback:
              type: string
              description: Full Python traceback (truncated at 100KB if needed)
        truncated:
          type: boolean
          description: True if any field was truncated at the 100KB limit
          default: false
        ended:
          type: boolean
          description: True for correctly closed spans; false if atexit flushed an unclosed span
          default: true

    TraceQuery:
      type: object
      description: Query helper signatures for AI agents reading trace_events
      properties:
        get_trace:
          type: object
          properties:
            run_id: { type: string }
            trace_id: { type: string }
          description: "SELECT * FROM trace_events WHERE run_id=? AND trace_id=? ORDER BY rowid"
        get_traces_by_event:
          type: object
          properties:
            run_id: { type: string }
            event_type: { type: string }
          description: "SELECT * FROM trace_events WHERE run_id=? AND event_type=? ORDER BY ts_start"
