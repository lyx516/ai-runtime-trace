# Agent Context Packet Schema (JSON)
# Written by Runtime Loop → read by delegate_task subagent's terminal tool
# File path: .hermes-flow/runs/<run_id>/sessions/<session_id>.context.json

AgentContextPacket:
  type: object
  required: [run_id, session_id, role_id, soul, state_id, available_tools]
  properties:
    run_id:
      type: string
      description: Flow run identifier
    session_id:
      type: string
      description: Unique session identifier (used for trace correlation and result matching)
    role_id:
      type: string
      description: Agent role (e.g., "architect", "reviewer")
    soul:
      type: string
      description: Personality definition from AgentRole.soul, verbatim
    state_id:
      type: string
      description: Current flow state identifier
    state_description:
      type: string
      description: Human-readable state purpose
    gate_info:
      type: object or "null"
      description: Current gate configuration (null if state has no gate)
      properties:
        required_roles:
          type: array
          items: string
        pass_values:
          type: array
          items: string
        fail_values:
          type: array
          items: string
        blocked_values:
          type: array
          items: string
        max_rounds:
          type: integer
    inbox_messages:
      type: array
      description: Unread and recent messages addressed to this role
      items:
        type: object
        properties:
          message_id: { type: string }
          from_role: { type: string }
          kind: { type: string }
          content: { type: string }
          created_at: { type: string }
    visible_artifacts:
      type: array
      items:
        type: object
        properties:
          artifact_id: { type: string }
          path: { type: string }
          produced_by_role: { type: string }
          created_at: { type: string }
    pending_decisions:
      type: array
      description: Decisions already submitted this round by other roles
      items:
        type: object
        properties:
          role_id: { type: string }
          value: { type: string }
          reason: { type: string }
    available_tools:
      type: array
      description: Tools the agent may call via python -c commands
      items:
        type: string
        enum: [inbox_read, message_send, submit_decision, query_status]
    discussion_history:
      type: array
      description: All messages exchanged in this state visit (in chronological order)
      items:
        type: object
        properties:
          role_id: { type: string }
          kind: { type: string }
          content: { type: string }
          created_at: { type: string }

# Result file schema
# Written by delegate_task subagent → read by Runtime Loop
# File path: .hermes-flow/runs/<run_id>/sessions/<session_id>.result.json

SessionResult:
  type: object
  required: [session_id, actions_taken, completed_at]
  properties:
    session_id:
      type: string
      description: Must match the session_id from the context packet
    actions_taken:
      type: array
      items:
        type: object
        properties:
          type:
            type: string
            enum: [message_send, submit_decision, read_artifact, write_artifact]
          # For message_send:
          recipients: { type: array, items: string }
          kind: { type: string }
          content: { type: string }
          # For submit_decision:
          value: { type: string }
          reason: { type: string }
          # For read/write artifact:
          path: { type: string }
    exited_early:
      type: boolean
      description: True if agent chose to exit without submitting a decision
    error:
      type: string or "null"
      description: Error message if session encountered a problem
    completed_at:
      type: string
      format: date-time
