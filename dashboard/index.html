<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Flow</title>
<style>
  :root {
    --bg-base: #0c0e12;
    --bg-elevated: #14161b;
    --bg-surface: #1b1e24;
    --border: #282c34;
    --border-accent: #363b44;
    --text-primary: #e4e7ed;
    --text-secondary: #8b929a;
    --text-tertiary: #5c636b;
    --accent: #58a6ff;
    --accent-muted: rgba(88, 166, 255, 0.12);
    --green: #3fb950;
    --green-muted: rgba(63, 185, 80, 0.12);
    --yellow: #d29922;
    --yellow-muted: rgba(210, 153, 34, 0.12);
    --red: #f85149;
    --red-muted: rgba(248, 81, 73, 0.12);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; height: 100%; overflow: hidden; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.5;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 250px;
    min-width: 250px;
    background: var(--bg-elevated);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .sidebar-item:hover { background: var(--bg-surface); color: var(--text-primary); }
  .sidebar-item.active { background: var(--accent-muted); color: var(--accent); }
  .sidebar-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sidebar-item .id-mono {
    font-family: SFMono-Regular, 'SF Mono', monospace;
    font-size: 10px;
    color: var(--text-tertiary);
  }

  .sidebar-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 8px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .sidebar-pagination button {
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-secondary);
    font-size: 11px;
    cursor: pointer;
  }
  .sidebar-pagination button:hover { background: var(--border); color: var(--text-primary); }
  .sidebar-pagination button:disabled { opacity: 0.4; cursor: default; }
  .sidebar-pagination .page-info { padding: 0 6px; }

  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-logo {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-right: 4px;
  }
  .topbar input {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    color: var(--text-primary);
    font-size: 13px;
    width: 200px;
    font-family: SFMono-Regular, 'SF Mono', monospace;
  }
  .topbar input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 2px var(--accent-muted);
  }
  .topbar button {
    padding: 5px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-surface);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .topbar button:hover {
    background: var(--border);
    border-color: var(--border-accent);
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.6;
  }
  .badge-completed { background: var(--green-muted); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
  .badge-active { background: var(--accent-muted); color: var(--accent); border: 1px solid rgba(88,166,255,0.25); }
  .badge-error { background: var(--red-muted); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    background: var(--bg-elevated);
    flex-shrink: 0;
  }
  .tabs button {
    padding: 9px 16px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    transition: color .15s;
  }
  .tabs button:hover { color: var(--text-primary); }
  .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Content */
  .content { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 16px 20px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .empty-state {
    color: var(--text-tertiary);
    text-align: center;
    padding: 64px 20px;
    font-size: 13px;
    line-height: 1.8;
  }

  /* Metric cards */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .metric-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
  }
  .metric-card .value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
    letter-spacing: -0.02em;
  }
  .metric-card .label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    text-align: left;
    padding: 7px 10px;
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
  }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }
  .data-table tr.current td { background: var(--accent-muted); }

  /* Sections */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 20px 0 10px;
  }

  /* Decision cards */
  .dec-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .dec-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    text-align: center;
    min-width: 80px;
  }
  .dec-card .count {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
  }
  .dec-card .lbl {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  /* Log stream */
  .log-stream {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px;
    max-height: 70vh;
    overflow-y: auto;
    font-family: SFMono-Regular, 'SF Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-entry {
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .log-ts { color: var(--text-tertiary); }
  .log-tag {
    font-weight: 600;
    margin: 0 4px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    display: none;
    z-index: 999;
    max-width: 360px;
  }
  #toast.info { background: var(--accent-muted); border: 1px solid rgba(88,166,255,0.3); color: var(--accent); display: block; }
  #toast.warn { background: var(--yellow-muted); border: 1px solid rgba(210,153,34,0.3); color: var(--yellow); display: block; }
  #toast.err { background: var(--red-muted); border: 1px solid rgba(248,81,73,0.3); color: var(--red); display: block; }

  /* Mermaid container */
  .mermaid-wrap {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 20px;
    text-align: center;
    overflow-x: auto;
  }

  /* Diff layout */
  .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .diff-col { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
  .diff-col h3 { font-size: 14px; font-weight: 600; margin: 0 0 8px; }

  @media (max-width: 768px) {
    .topbar { flex-wrap: wrap; }
    .topbar input { width: 100%; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .diff-grid { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .layout { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">Hermes Flow</span>
  <a href="pool.html" target="_blank" style="color:#8b949e;text-decoration:none;font-size:12px;margin-left:12px;">🧠 Agent Pool</a>
  <input id="run-input" type="text" placeholder="Run ID ..." onkeydown="if(event.key=='Enter')loadRun()">
  <button onclick="loadRun()">View</button>
  <span id="run-badge"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-list" id="sidebar-list"></div>
    <div class="sidebar-pagination" id="sidebar-pagination">
      <button id="sidebar-prev" onclick="sidebarPrev()">&larr;</button>
      <span class="page-info" id="sidebar-page-info"></span>
      <button id="sidebar-next" onclick="sidebarNext()">&rarr;</button>
    </div>
  </div>
  <div class="main-area">
  <div class="tabs" id="tabs" style="display:none">
    <button class="active" data-tab="graph">Graph + Conversation</button>
    <button data-tab="analysis">Analysis</button>
    <button data-tab="diff">Diff</button>
  </div>
  <div class="content" id="main-content">
    <div class="empty-state" id="empty-msg">
      Select a run from the sidebar or enter a Run ID
    </div>
    <div id="panel-graph" class="tab-panel">
      <div id="graph-dag" style="min-height:100px"></div>
    </div>
    <div id="panel-analysis" class="tab-panel"><div class="empty-state">Select a run first</div></div>
    <div id="panel-diff" class="tab-panel"><div class="empty-state">Select a run first</div></div>
  </div>
  </div>
</div>

<div id="toast"></div>

<script src="graph.js"></script>
<script src="analysis.js"></script>
<script src="diff.js"></script>
<script src="sidebar.js"></script>

<style>
.filter-chip {
  display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);
  cursor:pointer;transition:all .12s;
}
.filter-chip:hover { border-color:var(--accent);color:var(--accent); }
.filter-chip.active { background:var(--accent-muted);border-color:var(--accent);color:var(--accent); }
</style>

<script>
let currentRunId = '';
let currentRunStatus = '';

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn || !btn.dataset.tab) return;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  if (currentRunId) renderTab(btn.dataset.tab);
});

function activeTab() {
  return document.querySelector('.tabs button.active')?.dataset.tab || 'graph';
}

function setActiveTab(tab) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
}

let liveRenderTimer = null;
let liveRenderInFlight = false;
function requestCurrentRunRefresh(options = {}) {
  if (!currentRunId) return;
  if (!options.force && (currentRunStatus === 'completed' || currentRunStatus === 'aborted')) return;
  const tab = activeTab();
  if (tab === 'diff') return;
  clearTimeout(liveRenderTimer);
  liveRenderTimer = setTimeout(async () => {
    if (liveRenderInFlight) return;
    liveRenderInFlight = true;
    try { await renderTab(activeTab()); }
    finally { liveRenderInFlight = false; }
  }, 800);
}

async function loadRun() {
  const runId = document.getElementById('run-input').value.trim();
  if (!runId) return;
  currentRunId = runId;
  currentRunStatus = 'loading';
  if (location.hash.slice(1) !== runId) history.replaceState(null, '', '#' + encodeURIComponent(runId));
  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('tabs').style.display = 'flex';
  setActiveTab('graph');
  document.getElementById('run-badge').innerHTML =
    '<span class="badge badge-active">loading</span> <span style="font-size:12px;color:var(--text-tertiary);margin-left:4px">' + escapeHtml(runId.slice(0,12)) + '</span>';
  renderTab('graph');
  if (typeof sidebarRender === 'function') sidebarRender();
}

async function renderTab(tab) {
  const panel = document.getElementById('panel-' + tab);
  if (!panel) return;
  if (tab !== 'graph' && typeof cleanupSequenceUi === 'function') cleanupSequenceUi();
  // Ensure the active tab's panel is visible
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  panel.classList.add('active');
  try {
    const res = await fetch('/api/runs/' + currentRunId + '/graph');
    const data = await res.json();
    if (data.error) { panel.innerHTML = '<div class="empty-state">' + data.error + '</div>'; return; }
    currentRunStatus = data.status || '';
    const badge = data.status === 'completed' ? 'badge-completed' : data.status === 'active' ? 'badge-active' : 'badge-error';
    document.getElementById('run-badge').innerHTML =
      '<span class="badge ' + badge + '">' + escapeHtml(data.status || '?') + '</span>' +
      ' <span style="font-size:12px;color:var(--text-tertiary);margin-left:4px">' + escapeHtml(currentRunId.slice(0,12)) + '</span>';
    if (tab === 'graph') renderGraph(data);
    else if (tab === 'analysis') renderAnalysis(panel, data);
    else if (tab === 'diff') renderDiff(panel);
  } catch(e) {
    panel.innerHTML = '<div class="empty-state">Error: ' + e.message + '</div>';
  }
}

function loadRunFromHash() {
  if (!location.hash) return;
  const runId = decodeURIComponent(location.hash.slice(1));
  if (!runId || runId === currentRunId) return;
  document.getElementById('run-input').value = runId;
  loadRun();
}

window.addEventListener('hashchange', loadRunFromHash);
loadRunFromHash();
</script>
</body>
</html>
