flow_id: auto-371b4eab
name: 讲三个笑话
version: 1
initial_state_id: DESIGN
terminal_state_ids:
- DONE
- ABORT
agents:
  designer:
    profile_name: pool-designer
    soul: '你是一位激进的系统架构师，追求最优雅、最完整的方案。你倾向于 使用最佳实践和最新技术，不怕提出大胆的设计。你喜欢引用论文和 行业标准来支撑你的设计决策。你设计的方案必须考虑可扩展性、
      可维护性和性能。

      '
    skills: []
    toolsets: []
    memory_mode: run_isolated
    read_scope: []
    write_scope:
    - experiments/agent-pool/output/auto-371b4eab/
  critic:
    profile_name: pool-critic
    soul: '你是一位尖锐但公正的批评者。你的工作是挑战一切假设，指出方案中 的漏洞、过度设计和被忽略的细节。你认为"足够好"是不够的——每个 决策都应该经得起质疑。但你也会在对方提出有力论据时大方让步。

      '
    skills: []
    toolsets: []
    memory_mode: run_isolated
    read_scope: []
    write_scope:
    - experiments/agent-pool/output/auto-371b4eab/
  mediator:
    profile_name: pool-mediator
    soul: '你是一位经验丰富的技术负责人，擅长在争论中找到共识。你耐心听取 双方论点，认可每方的合理之处，然后提出一个融合了双方优点的方案。 你的目标是让每个人都被听见，同时推动项目前进。

      '
    skills: []
    toolsets: []
    memory_mode: run_isolated
    read_scope: []
    write_scope:
    - experiments/agent-pool/output/auto-371b4eab/
  decider:
    profile_name: pool-decider
    soul: '你是项目负责人，拥有最终决定权。你仔细阅读所有参与者的观点和 论据，然后做出最终决策。你的决策理由必须引用各方观点，说明 你采纳了什么、拒绝了什么以及原因。你不追求完美，而是追求在
      现有约束下最好的结果。

      '
    skills: []
    toolsets: []
    memory_mode: run_isolated
    read_scope: []
    write_scope:
    - experiments/agent-pool/output/auto-371b4eab/
states:
  DESIGN:
    description: 讲三个笑话
    actors: &id001
    - designer
    gate:
      type: decision
      required_roles: *id001
      pass_values:
      - APPROVE
      fail_values: []
      blocked_values:
      - BLOCKED
      on_pass: CRITIQUE
  CRITIQUE:
    description: 审查方案
    actors: &id002
    - critic
    gate:
      type: decision
      required_roles: *id002
      pass_values:
      - APPROVE
      fail_values:
      - REQUEST_CHANGES
      blocked_values:
      - BLOCKED
      on_pass: MEDIATE
      on_fail: REVISION
      max_rounds: 3
  REVISION:
    description: 回应批评
    actors: *id001
    gate:
      type: decision
      required_roles: *id001
      pass_values:
      - APPROVE
      fail_values:
      - REQUEST_CHANGES
      blocked_values:
      - BLOCKED
      on_pass: CRITIQUE
      on_fail: MEDIATE
      max_rounds: 3
  MEDIATE:
    description: 调解分歧
    actors: &id003
    - mediator
    gate:
      type: decision
      required_roles: *id003
      pass_values:
      - APPROVE
      fail_values:
      - REQUEST_CHANGES
      blocked_values:
      - BLOCKED
      on_pass: FINAL_DECISION
      on_fail: ABORT
      max_rounds: 2
  FINAL_DECISION:
    description: 最终决策
    actors: &id004
    - decider
    gate:
      type: decision
      required_roles: *id004
      pass_values:
      - APPROVE
      fail_values:
      - REQUEST_CHANGES
      blocked_values:
      - BLOCKED
      on_pass: DONE
      on_fail: ABORT
      max_rounds: 2
  DONE:
    terminal: true
    actors: []
  ABORT:
    terminal: true
    actors: []
