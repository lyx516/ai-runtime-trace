flow_id: vector-db-exp
name: "Vector DB from scratch — HNSW implementation"
version: 1
initial_state_id: DESIGN
terminal_state_ids: [DONE]

agents:
  architect:
    profile_name: flow-architect
    soul: "System architect specialized in vector search algorithms"
    skills: []
    toolsets: [terminal, file]
    memory_mode: run_isolated
    read_scope: []
    write_scope: [experiments/vector-db/fsm/]
  implementer:
    profile_name: flow-implementer
    soul: "Python backend engineer specialized in high-performance algorithms"
    skills: []
    toolsets: [terminal, file]
    memory_mode: run_isolated
    read_scope: [experiments/vector-db/fsm/]
    write_scope: [experiments/vector-db/fsm/]
  reviewer:
    profile_name: flow-reviewer
    soul: "Code reviewer specialized in algorithm correctness and performance"
    skills: []
    toolsets: [terminal, file]
    memory_mode: run_isolated
    read_scope: [experiments/vector-db/fsm/]
    write_scope: []

states:
  DESIGN:
    actors: [architect]
    gate:
      type: decision
      required_roles: [architect]
      pass_values: [APPROVE]
      on_pass: IMPLEMENT
  IMPLEMENT:
    actors: [implementer]
    gate:
      type: decision
      required_roles: [implementer]
      pass_values: [APPROVE]
      fail_values: [REQUEST_CHANGES]
      on_pass: REVIEW
      on_fail: IMPLEMENT
      max_rounds: 3
  REVIEW:
    actors: [reviewer]
    gate:
      type: decision
      required_roles: [reviewer]
      pass_values: [APPROVE]
      fail_values: [REQUEST_CHANGES]
      on_pass: DONE
      on_fail: IMPLEMENT
      max_rounds: 3
  DONE:
    terminal: true
    actors: []
