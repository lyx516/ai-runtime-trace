flow_id: three-agent-test
name: "Three agent test — broadcast & multicast"
version: 1
initial_state_id: PLAN
terminal_state_ids: [DONE]

agents:
  architect:
    profile_name: flow-architect
    soul: "System architect"
    skills: []
    toolsets: [terminal, file]
  implementer:
    profile_name: flow-implementer
    soul: "Implementer"
    skills: []
    toolsets: [terminal, file]
  reviewer:
    profile_name: flow-reviewer
    soul: "Code reviewer"
    skills: []
    toolsets: [terminal, file]

states:
  PLAN:
    actors: [architect, implementer, reviewer]
    gate:
      type: decision
      required_roles: [architect, implementer, reviewer]
      pass_values: [APPROVE]
      fail_values: [REQUEST_CHANGES]
      on_pass: DONE
      on_fail: PLAN
      max_rounds: 3
  DONE:
    terminal: true
    actors: []
