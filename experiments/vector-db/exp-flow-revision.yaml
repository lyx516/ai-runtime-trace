# Multi-round discussion flow: architect ↔ reviewer, revision loop
flow_id: multi-round-discussion
name: "Multi-round design review with revision"
version: 1
initial_state_id: DESIGN
terminal_state_ids: [DONE]

agents:
  architect:
    profile_name: flow-architect
    soul: "System architect specialized in vector search algorithms. You are thorough and responsive to feedback."
    skills: []
    toolsets: [terminal, file]
    memory_mode: run_isolated
  reviewer:
    profile_name: flow-reviewer
    soul: "Code reviewer specialized in algorithm correctness and performance. You pay attention to parameter choices."
    skills: []
    toolsets: [terminal, file]
    memory_mode: run_isolated

states:
  DESIGN:
    actors: [architect]
    gate:
      type: decision
      required_roles: [architect]
      pass_values: [APPROVE]
      fail_values: [REQUEST_CHANGES]
      on_pass: REVIEW
      on_fail: DESIGN
      max_rounds: 5
  REVIEW:
    actors: [reviewer]
    gate:
      type: decision
      required_roles: [reviewer]
      pass_values: [APPROVE]
      fail_values: [REQUEST_CHANGES]
      blocked_values: [BLOCKED]
      on_pass: DONE
      on_fail: DESIGN
      on_blocked: DONE
      max_rounds: 3
  DONE:
    terminal: true
    actors: []
